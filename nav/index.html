<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>表姐严选资料清单</title>
  <style>
    :root {
      --bg:#f3f6f8;
      --panel:#fff;
      --text:#172026;
      --muted:#68737d;
      --line:#d9dee3;
      --green:#0f766e;
      --green-bg:#d9f3ee;
      --blue:#2563eb;
      --blue-bg:#dbeafe;
      --amber:#b45309;
      --amber-bg:#fef3c7;
      --gray:#64748b;
      --gray-bg:#e2e8f0;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      background:linear-gradient(180deg,#edf4f7 0,#f7f9fb 220px,var(--bg) 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
      line-height:1.5;
    }
    main {
      width:min(980px,100%);
      margin:0 auto;
      padding:14px;
    }
    header {
      display:grid;
      gap:8px;
      margin-bottom:12px;
      padding:14px;
      background:var(--panel);
      border:1px solid var(--line);
      border-left:5px solid var(--green);
      border-radius:8px;
      box-shadow:0 8px 18px rgba(23,32,38,.05);
    }
    h1 {
      margin:0;
      font-size:clamp(22px,5vw,30px);
      letter-spacing:0;
      line-height:1.15;
    }
    .sub {
      color:var(--muted);
      font-size:13px;
    }
    .tools {
      position:sticky;
      top:0;
      z-index:5;
      padding:8px 0;
      background:rgba(243,246,248,.94);
      backdrop-filter:blur(10px);
    }
    input {
      width:100%;
      min-height:42px;
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
      color:var(--text);
      padding:8px 10px;
      font:inherit;
    }
    .count {
      margin:0 0 8px;
      color:var(--muted);
      font-size:13px;
    }
    .count strong {
      color:var(--green);
      font-size:16px;
    }
    .list {
      display:grid;
      gap:8px;
    }
    .row {
      display:grid;
      grid-template-columns:96px minmax(160px,1fr) 2fr;
      gap:10px;
      align-items:start;
      padding:12px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:8px;
      box-shadow:0 6px 16px rgba(23,32,38,.04);
    }
    .date {
      color:var(--green);
      font-weight:900;
      white-space:nowrap;
    }
    .title a {
      color:#172026;
      font-weight:900;
      text-decoration:none;
    }
    .title a:hover {
      color:var(--blue);
      text-decoration:underline;
    }
    .tags {
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }
    .tag {
      display:inline-flex;
      align-items:center;
      min-height:24px;
      padding:2px 8px;
      border-radius:999px;
      background:var(--gray-bg);
      color:var(--gray);
      font-size:12px;
      font-weight:850;
      white-space:normal;
      overflow-wrap:anywhere;
    }
    .tag.hot {
      background:var(--green-bg);
      color:var(--green);
    }
    .tag.report {
      background:var(--blue-bg);
      color:var(--blue);
    }
    .tag.watch {
      background:var(--amber-bg);
      color:var(--amber);
    }
    .empty {
      display:none;
      padding:18px;
      text-align:center;
      color:var(--muted);
      background:#fff;
      border:1px dashed #cbd5e1;
      border-radius:8px;
      font-weight:800;
    }
    footer {
      margin:14px 0 4px;
      color:var(--muted);
      font-size:12px;
      line-height:1.7;
    }
    @media (max-width: 680px) {
      main { padding:10px; }
      .row {
        grid-template-columns:1fr;
        gap:7px;
      }
      .date {
        font-size:14px;
      }
      .title a {
        font-size:17px;
      }
    }
  </style>
</head>
<body>
<main>
  <header>
    <h1>表姐严选资料清单</h1>
    <div class="sub">按上传日期记录：几月几日上传了什么报告，以及关键标签。后续新增内容直接一行一行往下加。</div>
  </header>

  <section class="tools" aria-label="搜索">
    <input id="searchInput" type="search" placeholder="搜索：CXL、Memory、内存墙、CPO类比、产业阶段..." autocomplete="off" />
  </section>

  <p class="count">当前显示 <strong id="resultCount">0</strong> 条</p>
  <section id="list" class="list" aria-label="资料清单"></section>
  <div id="empty" class="empty">没有匹配到内容。</div>

  <footer>
    仅作为资料索引，不替代实时行情、公告和新闻核验。
  </footer>
</main>

<script>
  const entries = [
    {
      date:"06月25日",
      title:"CXL 综合分析报告",
      url:"../cxl/",
      tags:["CXL","Memory","内存墙","DDR5","PCIe","CPO类比","产业阶段","海外/A股映射"]
    }
  ];

  const list = document.querySelector("#list");
  const empty = document.querySelector("#empty");
  const searchInput = document.querySelector("#searchInput");
  const resultCount = document.querySelector("#resultCount");

  function tagClass(tag) {
    if (["CXL","Memory","内存墙"].includes(tag)) return "hot";
    if (["CPO类比","产业阶段"].includes(tag)) return "report";
    if (["海外/A股映射"].includes(tag)) return "watch";
    return "";
  }

  function render() {
    const keyword = searchInput.value.trim().toLowerCase();
    const filtered = entries.filter(entry => {
      const text = [entry.date, entry.title, ...entry.tags].join(" ").toLowerCase();
      return !keyword || text.includes(keyword);
    });

    list.innerHTML = filtered.map(entry => `
      <article class="row">
        <div class="date">${entry.date}</div>
        <div class="title"><a href="${entry.url}">${entry.title}</a></div>
        <div class="tags">${entry.tags.map(tag => `<span class="tag ${tagClass(tag)}">${tag}</span>`).join("")}</div>
      </article>
    `).join("");

    resultCount.textContent = filtered.length;
    empty.style.display = filtered.length ? "none" : "block";
  }

  searchInput.addEventListener("input", render);
  render();
</script>
</body>
</html>
