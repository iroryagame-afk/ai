<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSN2 Alen交易系统</title>
  <style>
    :root {
      --ink:#17212b; --muted:#65727f; --line:#d7e1ea; --bg:#f4f8fb;
      --teal:#0f8378; --teal-soft:#dff6f1; --blue:#2762d9; --blue-soft:#e7efff;
      --amber:#b95a00; --amber-soft:#fff1cf; --red:#c93232; --red-soft:#ffe3e3;
      --green:#138a47; --green-soft:#e2f7e9; --panel:#ffffff;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"PingFang SC","Microsoft YaHei",sans-serif; color:var(--ink); background:var(--bg); }
    .page { max-width:1480px; margin:0 auto; padding:22px 24px 48px; }
    .topbar { display:flex; gap:16px; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; margin-bottom:14px; }
    h1 { margin:0; font-size:42px; line-height:1.05; letter-spacing:0; }
    .meta { color:var(--muted); font-size:16px; line-height:1.8; }
    .notice { border:1px solid #9fded6; background:#effcfa; color:#31545b; padding:12px 14px; border-radius:8px; margin:14px 0 18px; font-weight:650; }
    .summary { display:grid; grid-template-columns:1.45fr repeat(5, minmax(145px, 1fr)); gap:12px; margin-bottom:16px; }
    .hero, .metric { border:1px solid #9fded6; background:linear-gradient(135deg,#effcfa,#dff6f1); border-radius:8px; padding:18px; min-height:112px; }
    .hero { border-left:8px solid var(--teal); }
    .hero .eyebrow, .metric .label { color:var(--teal); font-size:15px; font-weight:800; margin-bottom:8px; }
    .hero .headline { font-size:34px; line-height:1.1; font-weight:900; }
    .hero .sub { color:#4f6571; margin-top:10px; font-weight:650; }
    .metric:nth-child(3) { border-color:#ffcf69; background:linear-gradient(135deg,#fffaf0,#fff1cf); }
    .metric:nth-child(4) { border-color:#b5ccff; background:linear-gradient(135deg,#f2f6ff,#e7efff); }
    .metric:nth-child(5) { border-color:#9fd3f4; background:linear-gradient(135deg,#f0f9ff,#e0f2fe); }
    .metric:nth-child(6) { border-color:#c8b7ff; background:linear-gradient(135deg,#f8f4ff,#eee7ff); }
    .metric .value { font-size:34px; font-weight:900; color:var(--teal); }
    .metric:nth-child(3) .value { color:var(--amber); }
    .metric:nth-child(4) .value { color:var(--blue); }
    .metric:nth-child(6) .value { color:#6740c7; }
    .section { background:var(--panel); border:1px solid var(--line); border-radius:8px; margin-top:14px; overflow:hidden; }
    .section-head { display:flex; gap:14px; justify-content:space-between; align-items:center; padding:16px 18px; background:#eaf1f6; border-bottom:1px solid var(--line); }
    .section-title { font-size:22px; font-weight:900; }
    .section-note { color:var(--muted); font-size:14px; font-weight:650; }
    .toolbar { display:flex; flex-wrap:wrap; gap:10px; padding:14px 16px; border-bottom:1px solid var(--line); background:#fbfdff; }
    input, select, button { font:inherit; border:1px solid #c7d4e2; border-radius:8px; background:white; color:var(--ink); min-height:42px; }
    input { padding:0 12px; min-width:300px; flex:1; }
    select { padding:0 34px 0 12px; min-width:160px; }
    button { padding:0 14px; font-weight:850; cursor:pointer; }
    button.active { background:var(--ink); color:white; border-color:var(--ink); }
    .table-wrap { overflow:auto; }
    table { width:100%; border-collapse:collapse; min-width:980px; }
    th, td { border-bottom:1px solid var(--line); padding:12px 14px; text-align:left; vertical-align:top; }
    th { background:#e9eff5; color:#2c3b4f; font-weight:900; position:sticky; top:0; z-index:1; }
    tbody tr:nth-child(odd) { background:#f4fffc; }
    .code { font-size:20px; font-weight:950; color:#111a22; white-space:nowrap; }
    .muted { color:var(--muted); }
    .pill { display:inline-flex; align-items:center; min-height:28px; border-radius:999px; padding:3px 10px; background:var(--teal-soft); color:var(--teal); font-weight:900; margin:2px 4px 2px 0; }
    .pill.warn { background:var(--amber-soft); color:var(--amber); }
    .pill.bad { background:var(--red-soft); color:var(--red); }
    .pill.ok { background:var(--green-soft); color:var(--green); }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:16px; }
    .guide-list { padding:16px 20px; color:#394b5c; line-height:1.8; }
    .guide-list li { margin-bottom:4px; }
    .empty { padding:22px; color:var(--muted); font-weight:750; }
    .countline { padding:12px 16px; color:var(--teal); font-weight:900; border-bottom:1px solid var(--line); }
    @media (max-width: 900px) {
      .page { padding:14px 10px 32px; }
      h1 { font-size:32px; }
      .summary { grid-template-columns:1fr 1fr; }
      .hero { grid-column:1 / -1; }
      .hero .headline { font-size:30px; }
      .metric { min-height:88px; padding:14px; }
      .metric .value { font-size:28px; }
      .grid2 { grid-template-columns:1fr; }
      input { min-width:100%; }
      table, thead, tbody, th, td, tr { display:block; min-width:0; }
      thead { display:none; }
      tbody tr { margin:12px; border:1px solid var(--line); border-radius:8px; overflow:hidden; background:#fff; }
      td { display:grid; grid-template-columns:116px 1fr; gap:8px; border-bottom:1px solid #e7eef5; padding:10px 12px; }
      td:before { content:attr(data-label); color:#496071; font-weight:900; }
      .code { font-size:23px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>CSN2 Alen交易系统</h1>
        <div class="meta" id="metaLine"></div>
      </div>
    </div>
    <div class="notice">本页面按上传的 5 表交易系统快照生成。表内 GOOGLEFINANCE / 手填字段如果为空或为 0，会如实显示，不自动编造价格。</div>
    <section class="summary" id="summary"></section>

    <section class="section">
      <div class="section-head"><div class="section-title">今日扫描</div><div class="section-note">来自 01 候选池总表，优先看强信号、5条过滤、三类策略信号</div></div>
      <div class="toolbar">
        <input id="poolSearch" placeholder="搜索代码、名称、行业、信号、备注">
        <button data-filter="strong">强信号</button>
        <button data-filter="passed">5条过滤</button>
        <button data-filter="breakout">突破</button>
        <button data-filter="pullback">回踩</button>
        <button data-filter="gap">跳空</button>
        <button data-filter="risk">风险/不通过</button>
        <select id="poolMarket"></select>
        <button id="poolReset">重置</button>
      </div>
      <div class="countline" id="poolCount"></div>
      <div class="table-wrap"><table id="poolTable"></table></div>
    </section>

    <section class="section">
      <div class="section-head"><div class="section-title">交易计划</div><div class="section-note">来自 02 日数据表，回答买点、止损、目标价和仓位</div></div>
      <div class="toolbar">
        <input id="dailySearch" placeholder="搜索代码、机会类型、买点、排除原因">
        <select id="prioritySelect"></select>
        <button id="dailyReset">重置</button>
      </div>
      <div class="countline" id="dailyCount"></div>
      <div class="table-wrap"><table id="dailyTable"></table></div>
    </section>

    <div class="grid2">
      <section class="section">
        <div class="section-head"><div class="section-title">大盘总开关</div><div class="section-note">来自 04 大盘环境表</div></div>
        <div class="table-wrap"><table id="marketTable"></table></div>
      </section>
      <section class="section">
        <div class="section-head"><div class="section-title">ATR动态风控</div><div class="section-note">来自 05 ATR持仓管理</div></div>
        <div class="table-wrap"><table id="atrTable"></table></div>
      </section>
    </div>

    <section class="section">
      <div class="section-head"><div class="section-title">执行复盘</div><div class="section-note">来自 03 执行表</div></div>
      <div class="table-wrap"><table id="execTable"></table></div>
    </section>

    <section class="section">
      <div class="section-head"><div class="section-title">系统说明</div><div class="section-note">来自 00 总说明</div></div>
      <ol class="guide-list" id="guideList"></ol>
    </section>
  </div>

      document.getElementById('dailySearch').oninput = e => { state.dailySearch = e.target.value; rerenderDaily(); };
      document.getElementById('prioritySelect').onchange = e => { state.priority = e.target.value; rerenderDaily(); };
      document.getElementById('dailyReset').onclick = () => { state.dailySearch=''; state.priority='全部优先级'; document.getElementById('dailySearch').value=''; document.getElementById('prioritySelect').value='全部优先级'; rerenderDaily(); };
      rerenderPool();
      rerenderDaily();
      renderTable('marketTable', DATA.market, marketCols);
      renderTable('atrTable', DATA.atr, atrCols, '暂无持仓风控数据');
      renderTable('execTable', DATA.exec, execCols, '暂无执行记录');
      document.getElementById('guideList').innerHTML = DATA.guide.slice(0, 22).map(x=>`<li>${esc(x)}</li>`).join('');
    }
    init();
  </script>
</body>
</html>
